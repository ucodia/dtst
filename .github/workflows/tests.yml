name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dtst (no deps)
        run: uv pip install -e . --no-deps

      - name: Install lean test + runtime deps
        run: |
          uv pip install \
            pytest pytest-cov responses \
            click pyyaml python-dotenv numpy pillow tqdm \
            opencv-python-headless scipy
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: uv run --no-sync pytest tests/ -v --cov --cov-report=term-missing

      - name: Append coverage to job summary
        if: always()
        run: |
          {
            echo "## Coverage report (Python ${{ matrix.python-version }})"
            echo ""
            echo '```'
            uv run --no-sync coverage report 2>/dev/null || echo "No coverage data available."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
