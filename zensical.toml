[project]
site_name = "dtst"
repo_url = "https://github.com/Ucodia/dtst"
repo_name = "Ucodia/dtst"
nav = [
  { "Home" = "index.md" },
  { "Concepts" = "concepts.md" },
  { "Tutorial" = [
    { "Overview" = "tutorial/index.md" },
    { "Collecting images" = "tutorial/collecting-images.md" },
    { "Extracting features" = "tutorial/extracting-features.md" },
    { "Selecting and refining" = "tutorial/selecting-and-refining.md" },
    { "Final preparation" = "tutorial/final-preparation.md" },
  ] },
  { "Advanced" = [
    { "Configuration" = "advanced/configuration.md" },
    { "Workflows" = "advanced/workflows.md" },
    { "Python API" = "advanced/python-api.md" },
  ] },
  { "Reference" = [
    { "CLI" = "reference/cli.md" },
    { "Python API" = "reference/api.md" },
  ] },
]

[project.plugins.mkdocstrings.handlers.python.options]
allow_inspection = false
show_root_heading = true
show_signature_annotations = true
docstring_style = "google"

[project.theme]
features = ["navigation.footer"]

[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.superfences]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"